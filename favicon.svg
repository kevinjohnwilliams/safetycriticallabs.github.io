<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle — dark so it reads on light browser tabs -->
  <circle cx="16" cy="16" r="16" fill="#111110"/>
  <!-- Beaded outer ring -->
  <circle cx="16" cy="16" r="14" stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-dasharray="2 2.2"/>
  <!-- Iris rings -->
  <circle cx="16" cy="16" r="11" stroke="rgba(255,255,255,0.2)" stroke-width="0.75"/>
  <circle cx="16" cy="16" r="7.5" stroke="rgba(255,255,255,0.22)" stroke-width="0.75"/>
  <!-- Lens — navy with gold ring -->
  <circle cx="16" cy="16" r="4.5" fill="#1B3A6B" stroke="rgba(180,130,42,0.7)" stroke-width="0.8"/>
  <!-- Compliance line — red -->
  <line x1="11" y1="16" x2="21" y2="16" stroke="#C8272D" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Pupil -->
  <circle cx="16" cy="16" r="1.6" fill="#C8272D"/>
</svg>
